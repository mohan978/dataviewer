<!DOCTYPE html>
<html>
<head>
    <title>Footprint Chart Dynamic Interval</title>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body { margin:0; background:#111; font-family: Arial; }

        textarea {
            width:100%;
            height:50px;
            background:#000;
            color:#0f0;
        }

        input, button {
            padding:6px;
            margin:5px;
        }

        button { cursor:pointer; }

        #chartBubble {
            width:100%;
            height:80vh;
            position:relative;
        }

        #bubbleCanvas {
            position:absolute;
            top:0;
            left:0;
            pointer-events:none;
            z-index:10;
        }
    </style>
</head>

<body>

<input type="file" id="fileInput" accept=".json,.txt">

<textarea id="dataInput" placeholder="Paste or load JSON data..." oninput="runBubbleChart();"></textarea><br>

<button onclick="clearInput()">Clear</button>

<input id="intervalInput" value="5">
<button onclick="runBubbleChart()">Load Chart</button>
<button onclick="toggleBubbles(event)">Hide Bubbles</button>

<input id="multiplierInput" value="0">
<input id="bubbleSize" value="0.3">
<input id="BubblesCap" value="0.35">

<div id="chartBubble"></div>

<script>

let showBubbles = true;

document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        document.getElementById("dataInput").value = event.target.result;
        runBubbleChart();
    };
    reader.readAsText(file);
});

function toggleBubbles(e) {
    showBubbles = !showBubbles;
    if (e) e.target.innerText = showBubbles ? "Hide Bubbles" : "Show Bubbles";
}

function runBubbleChart() {

    const bubbleScale = Number(document.getElementById("bubbleSize").value);
    const BubblesCap = Number(document.getElementById("BubblesCap").value);

    let raw;
    try {
        raw = JSON.parse(document.getElementById("dataInput").value);
    } catch {
        alert("Invalid JSON");
        return;
    }

    const intervalMin = Number(document.getElementById("intervalInput").value);
    const multiplier = Number(document.getElementById("multiplierInput").value);

    const container = document.getElementById("chartBubble");
    container.innerHTML = "";

    const chart = LightweightCharts.createChart(container, {
        layout: { background: { color: '#111' }, textColor: '#DDD' },
        grid: { vertLines: { visible: false }, horzLines: { visible: false } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
    });

    const candleSeries = chart.addSeries(
        LightweightCharts.CandlestickSeries,
        {
            upColor: "#000",
            downColor: "#000",
            borderUpColor: "#00ff88",
            borderDownColor: "#ff3b3b",
        }
    );

    let buckets = {};
    let bubbles = [];

    Object.keys(raw).forEach(ts => {

        const tMs = Number(ts);
        const tSec = Math.floor((tMs + 19800000) / 1000);

        let key, time;

        if (intervalMin === 0) {
            key = tSec;
            time = tSec;
        } else {
            const sec = intervalMin * 60;
            const idx = Math.floor(tSec / sec);
            key = idx;
            time = idx * sec;
        }

        if (!buckets[key]) {
            buckets[key] = { time, prices: [] };
        }

        const hists = raw[ts].graphicsCmds?.create?.hhists;
        if (!hists) return;

        hists.forEach(h => {
            h.data.forEach(d => {

                const price = Number(d.priceHigh.toFixed(2));

                buckets[key].prices.push(price);

                bubbles.push({
                    time,
                    price,
                    size: d.rate[0] + d.rate[1],
                    delta: d.rate[0] - d.rate[1]
                });
            });
        });
    });

    const avg = bubbles.reduce((a,b)=>a+b.size,0)/bubbles.length;
    bubbles = bubbles.filter(b => b.size >= avg * multiplier);

    const candles = Object.values(buckets)
        .filter(b => b.prices.length)
        .map(b => ({
            time: b.time,
            open: b.prices[0],
            high: Math.max(...b.prices),
            low: Math.min(...b.prices),
            close: b.prices[b.prices.length - 1]
        }))
        .sort((a,b)=>a.time-b.time);

    candleSeries.setData(candles);
    chart.timeScale().fitContent();

    // ===== CANVAS (FIXED) =====
    const canvas = document.createElement("canvas");
    canvas.id = "bubbleCanvas";
    container.appendChild(canvas);

    const ctx = canvas.getContext("2d");

    function resize() {
        // ✅ NO DPR scaling (important)
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    let mouseX = null;

    container.addEventListener("mousemove", e => {
        const rect = container.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
    });

    container.addEventListener("mouseleave", () => mouseX = null);

    function draw() {

        ctx.clearRect(0,0,canvas.width,canvas.height);

        const range = chart.timeScale().getVisibleRange();
        if (!range) return;

        if (showBubbles) {
            for (let i = 0; i < bubbles.length; i++) {

                const b = bubbles[i];

                if (b.time < range.from || b.time > range.to) continue;

                const x = chart.timeScale().timeToCoordinate(b.time);
                const y = candleSeries.priceToCoordinate(b.price);

                if (x == null || y == null) continue;

                // ✅ FIXED size (no DPR bug)
                const r = Math.max(2, Math.sqrt(b.size) * bubbleScale);

                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);

                ctx.fillStyle = b.delta > 0
                    ? `rgba(0,255,0,${BubblesCap})`
                    : `rgba(255,0,0,${BubblesCap})`;

                ctx.fill();
            }
        }

        if (mouseX !== null) {
            ctx.beginPath();
            ctx.moveTo(mouseX, 0);
            ctx.lineTo(mouseX, canvas.height);
            ctx.strokeStyle = "#888";
            ctx.stroke();
        }
    }

    function animate() {
        draw();
        requestAnimationFrame(animate);
    }

    animate();

    chart.timeScale().subscribeVisibleTimeRangeChange(draw);
}

function clearInput() {
    document.getElementById("dataInput").value = "";
}

</script>
</body>
</html>
